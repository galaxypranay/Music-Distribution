<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Release - Music Distribution Portal</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">MD</div>
                <div class="logo-text">MusicDist</div>
            </div>
            <div class="user-profile">
                <div class="user-avatar">JD</div>
                <div class="user-info">
                    <h3>John Doe</h3>
                    <p>Artist & Producer</p>
                </div>
            </div>
            <button class="logout-btn">Logout</button>
        </header>
        
        <div class="neumorphic-card">
            <h2 style="margin-bottom: 24px;">New Release</h2>
            <p style="color: #B0B0B0; margin-bottom: 24px;">Submit your song for distribution to major platforms</p>
            
            <form id="newReleaseForm">
                <!-- Song Information Section -->
                <div class="form-group">
                    <label for="songTitle" class="form-label">Song Title</label>
                    <input type="text" id="songTitle" class="form-control neumorphic-input" placeholder="Enter song title" required>
                </div>
                
                <div class="form-group">
                    <label for="artistName" class="form-label">Artist Name</label>
                    <input type="text" id="artistName" class="form-control neumorphic-input" placeholder="Enter artist name" required>
                </div>
                
                <div class="form-group">
                    <label for="featuring" class="form-label">Featuring Artist (Optional)</label>
                    <input type="text" id="featuring" class="form-control neumorphic-input" placeholder="Enter featuring artist">
                </div>
                
                <div class="form-group">
                    <label for="genre" class="form-label">Genre</label>
                    <select id="genre" class="form-control neumorphic-input" required>
                        <option value="">Select Genre</option>
                        <option value="Hip Hop">Hip Hop</option>
                        <option value="Pop">Pop</option>
                        <option value="Rock">Rock</option>
                        <option value="Electronic">Electronic</option>
                        <option value="R&B">R&B</option>
                        <option value="Jazz">Jazz</option>
                        <option value="Classical">Classical</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="language" class="form-label">Language</label>
                    <input type="text" id="language" class="form-control neumorphic-input" placeholder="Enter language (e.g., English, Spanish)" required>
                </div>
                
                <div class="form-group">
                    <label for="releaseDate" class="form-label">Release Date</label>
                    <input type="date" id="releaseDate" class="form-control neumorphic-input" required>
                </div>
                
                <!-- Description Section -->
                <div class="form-group">
                    <label for="description" class="form-label">Description</label>
                    <textarea id="description" class="form-control neumorphic-input textarea" placeholder="Tell us about your song, inspiration, etc." rows="4"></textarea>
                </div>
                
                <!-- Upload Audio Section -->
                <div class="form-group">
                    <label class="form-label">Upload Audio</label>
                    <div class="upload-zone" id="audioUploadZone">
                        <div class="upload-icon">🎵</div>
                        <div class="upload-text">Drag & Drop your audio file here</div>
                        <div class="upload-hint">or click to select file</div>
                        <input type="file" id="audioFile" accept=".mp3,.wav" style="display: none;">
                    </div>
                    <div id="audioFileInfo" class="file-info" style="display: none;">
                        <div class="file-info-item">
                            <span class="file-info-label">File Name:</span>
                            <span class="file-info-value" id="audioFileName"></span>
                        </div>
                        <div class="file-info-item">
                            <span class="file-info-label">File Size:</span>
                            <span class="file-info-value" id="audioFileSize"></span>
                        </div>
                    </div>
                </div>
                
                <!-- Upload Cover Art Section -->
                <div class="form-group">
                    <label class="form-label">Upload Cover Art</label>
                    <div class="upload-zone" id="coverUploadZone">
                        <div class="upload-icon">🖼️</div>
                        <div class="upload-text">Drag & Drop your cover image here</div>
                        <div class="upload-hint">or click to select file</div>
                        <input type="file" id="coverFile" accept=".jpg,.jpeg,.png" style="display: none;">
                    </div>
                    <div id="coverFileInfo" class="file-info" style="display: none;">
                        <div class="file-info-item">
                            <span class="file-info-label">File Name:</span>
                            <span class="file-info-value" id="coverFileName"></span>
                        </div>
                        <div class="file-info-item">
                            <span class="file-info-label">File Size:</span>
                            <span class="file-info-value" id="coverFileSize"></span>
                        </div>
                    </div>
                    <div id="coverPreview" class="image-preview" style="display: none;">
                        <img id="coverImagePreview" alt="Cover Preview">
                    </div>
                </div>
                
                <button type="submit" class="btn-primary w-100" style="margin-top: 30px;">
                    Submit For Distribution
                    <span class="loading-spinner" id="submitSpinner" style="display: none;"></span>
                </button>
            </form>
        </div>
    </div>
    
    <script>
        // Audio file upload handling
        const audioUploadZone = document.getElementById('audioUploadZone');
        const audioFileInput = document.getElementById('audioFile');
        const audioFileInfo = document.getElementById('audioFileInfo');
        const audioFileName = document.getElementById('audioFileName');
        const audioFileSize = document.getElementById('audioFileSize');
        
        audioUploadZone.addEventListener('click', () => {
            audioFileInput.click();
        });
        
        audioUploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            audioUploadZone.classList.add('dragover');
        });
        
        audioUploadZone.addEventListener('dragleave', () => {
            audioUploadZone.classList.remove('dragover');
        });
        
        audioUploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            audioUploadZone.classList.remove('dragover');
            
            const file = e.dataTransfer.files[0];
            if (file && (file.type === 'audio/mpeg' || file.type === 'audio/wav')) {
                handleFileUpload(file, audioFileInfo, audioFileName, audioFileSize);
            } else {
                alert('Please upload a valid MP3 or WAV file');
            }
        });
        
        audioFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && (file.type === 'audio/mpeg' || file.type === 'audio/wav')) {
                handleFileUpload(file, audioFileInfo, audioFileName, audioFileSize);
            } else {
                alert('Please upload a valid MP3 or WAV file');
            }
        });
        
        // Cover art upload handling
        const coverUploadZone = document.getElementById('coverUploadZone');
        const coverFileInput = document.getElementById('coverFile');
        const coverFileInfo = document.getElementById('coverFileInfo');
        const coverFileName = document.getElementById('coverFileName');
        const coverFileSize = document.getElementById('coverFileSize');
        const coverPreview = document.getElementById('coverPreview');
        const coverImagePreview = document.getElementById('coverImagePreview');
        
        coverUploadZone.addEventListener('click', () => {
            coverFileInput.click();
        });
        
        coverUploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            coverUploadZone.classList.add('dragover');
        });
        
        coverUploadZone.addEventListener('dragleave', () => {
            coverUploadZone.classList.remove('dragover');
        });
        
        coverUploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            coverUploadZone.classList.remove('dragover');
            
            const file = e.dataTransfer.files[0];
            if (file && (file.type === 'image/jpeg' || file.type === 'image/png')) {
                handleImageUpload(file, coverFileInfo, coverFileName, coverFileSize, coverPreview, coverImagePreview);
            } else {
                alert('Please upload a valid JPG or PNG image');
            }
        });
        
        coverFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && (file.type === 'image/jpeg' || file.type === 'image/png')) {
                handleImageUpload(file, coverFileInfo, coverFileName, coverFileSize, coverPreview, coverImagePreview);
            } else {
                alert('Please upload a valid JPG or PNG image');
            }
        });
        
        function handleFileUpload(file, infoElement, nameElement, sizeElement) {
            nameElement.textContent = file.name;
            sizeElement.textContent = formatFileSize(file.size);
            infoElement.style.display = 'block';
        }
        
        function handleImageUpload(file, infoElement, nameElement, sizeElement, previewElement, previewImgElement) {
            nameElement.textContent = file.name;
            sizeElement.textContent = formatFileSize(file.size);
            infoElement.style.display = 'block';
            
            const reader = new FileReader();
            reader.onload = function(e) {
                previewImgElement.src = e.target.result;
                previewElement.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
        
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        // Form submission handling
        document.getElementById('newReleaseForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Show loading spinner
            const submitButton = this.querySelector('button[type="submit"]');
            const spinner = document.getElementById('submitSpinner');
            submitButton.disabled = true;
            spinner.style.display = 'inline-block';
            
            // Simulate upload process
            setTimeout(() => {
                // Hide spinner and show success
                spinner.style.display = 'none';
                submitButton.innerHTML = 'Submitted Successfully! <span class="success-check"></span>';
                submitButton.style.background = 'linear-gradient(135deg, #00D4FF, #0099CC)';
                
                // Reset form after delay
                setTimeout(() => {
                    window.location.href = 'my-uploads.html';
                }, 1500);
            }, 2000);
        });
    </script>
</body>
</html>
