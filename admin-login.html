<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Music Distribution Portal</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="container">
        <div class="neumorphic-card">
            <div class="logo">
                <div class="logo-icon">AD</div>
                <div class="logo-text">Admin Panel</div>
            </div>
            <h2 style="text-align: center; margin-bottom: 24px;">Admin Login</h2>
            
            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-control neumorphic-input" placeholder="Enter admin email" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control neumorphic-input" placeholder="Enter admin password" required>
                </div>
                
                <button type="submit" class="btn-primary w-100">Login as Admin</button>
            </form>
        </div>
    </div>
    
    <script>
        // Form validation
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // In a real app, you would send this data to a server
            alert('Admin login successful! Redirecting to admin dashboard...');
            window.location.href = 'admin-dashboard.html';
        });
    </script>
</body>
</html>
