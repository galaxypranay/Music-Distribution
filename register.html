<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Music Distribution Portal</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="container">
        <div class="neumorphic-card">
            <div class="logo">
                <div class="logo-icon">MD</div>
                <div class="logo-text">MusicDist</div>
            </div>
            <h2 style="text-align: center; margin-bottom: 24px;">Create Account</h2>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" id="fullName" class="form-control neumorphic-input" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label for="artistName" class="form-label">Artist Name</label>
                    <input type="text" id="artistName" class="form-control neumorphic-input" placeholder="Enter your artist name" required>
                </div>
                
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-control neumorphic-input" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="tel" id="phone" class="form-control neumorphic-input" placeholder="Enter your phone number" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control neumorphic-input" placeholder="Create password" required>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control neumorphic-input" placeholder="Confirm password" required>
                </div>
                
                <button type="submit" class="btn-primary w-100">Create Account</button>
            </form>
            
            <div class="text-center mt-4">
                <p>Already have an account? <a href="login.html" class="text-primary">Login here</a></p>
            </div>
        </div>
    </div>
    
    <script>
        // Form validation
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }
            
            // In a real app, you would send this data to a server
            alert('Account created successfully! Redirecting to dashboard...');
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
