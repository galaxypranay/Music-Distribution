<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Music Distribution Portal</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">MD</div>
                <div class="logo-text">MusicDist</div>
            </div>
            <div class="user-profile">
                <div class="user-avatar">JD</div>
                <div class="user-info">
                    <h3>John Doe</h3>
                    <p>Artist & Producer</p>
                </div>
            </div>
            <button class="logout-btn">Logout</button>
        </header>
        
        <div class="stats-grid">
            <div class="stat-card neumorphic-card">
                <div class="stat-value">12</div>
                <div class="stat-label">Total Uploads</div>
            </div>
            <div class="stat-card neumorphic-card">
                <div class="stat-value">3</div>
                <div class="stat-label">Pending Releases</div>
            </div>
            <div class="stat-card neumorphic-card">
                <div class="stat-value">9</div>
                <div class="stat-label">Completed Releases</div>
            </div>
        </div>
        
        <div class="neumorphic-card">
            <h2 style="margin-bottom: 20px;">Recent Uploads</h2>
            <button class="btn-primary" style="width: 100%; margin-bottom: 24px;">New Release</button>
            
            <table class="neumorphic-table">
                <thead>
                    <tr>
                        <th>Cover</th>
                        <th>Song Name</th>
                        <th>Artist</th>
                        <th>Upload Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><img src="https://via.placeholder.com/50" alt="Cover" class="table-avatar"></td>
                        <td>Midnight Vibes</td>
                        <td>John Doe</td>
                        <td>2026-06-10</td>
                        <td class="table-actions">
                            <button class="table-btn view">View</button>
                        </td>
                    </tr>
                    <tr>
                        <td><img src="https://via.placeholder.com/50" alt="Cover" class="table-avatar"></td>
                        <td>Summer Nights</td>
                        <td>John Doe feat. Jane Smith</td>
                        <td>2026-06-05</td>
                        <td class="table-actions">
                            <button class="table-btn view">View</button>
                        </td>
                    </tr>
                    <tr>
                        <td><img src="https://via.placeholder.com/50" alt="Cover" class="table-avatar"></td>
                        <td>Urban Beats</td>
                        <td>John Doe</td>
                        <td>2026-05-28</td>
                        <td class="table-actions">
                            <button class="table-btn view">View</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        // Simple script for demo purposes
        document.querySelector('.logout-btn').addEventListener('click', function() {
            // In a real app, you would clear session and redirect to login
            alert('Logged out successfully!');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
